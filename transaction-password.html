<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تغيير كلمة مرور المعاملة</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

<header class="top-header">
<div class="logo-box">
<div class="logo-circle">🔒</div>
<div>
<h1>كلمة مرور المعاملة</h1>
<p>تغيير كلمة المرور الخاصة بالسحب</p>
</div>
</div>

<a href="account.html" class="lang-btn">رجوع</a>
</header>


<section class="section-box">

<div class="section-title">
<h2>تغيير كلمة المرور</h2>
</div>

<form id="transactionPasswordForm" class="deposit-form">

<input
type="password"
id="oldPassword"
class="form-input"
placeholder="كلمة المرور القديمة"
required
/>

<input
type="password"
id="newPassword"
class="form-input"
placeholder="كلمة المرور الجديدة"
required
/>

<input
type="password"
id="confirmPassword"
class="form-input"
placeholder="تأكيد كلمة المرور"
required
/>

<button type="submit" class="primary-btn full-btn">
حفظ التغيير
</button>

</form>

<p id="passwordMessage" class="note"></p>

</section>


<nav class="bottom-nav">

<a href="index.html" class="nav-item">
<span>🏠</span>
<small>الرئيسية</small>
</a>

</a>

</a>

<small>سحب</small>
</a>

<a href="account.html" class="nav-item active">
<span>👤</span>
<small>الحساب</small>
</a>

</nav>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="transaction-password.js"></script>

</body>
</html>
