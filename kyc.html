<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التحقق من الهوية - 1X.swt</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <header class="top-header">
      <div class="logo-box">
        <div class="logo-circle">ID</div>
        <div>
          <h1>التحقق من الهوية</h1>
          <p>رفع بيانات التوثيق ومتابعة الحالة</p>
        </div>
      </div>
      <a href="account.html" class="lang-btn back-link">رجوع</a>
    </header>

    <section class="section-box">
      <div class="section-title">
        <h2>الحالة الحالية</h2>
      </div>

      <div id="kycStatusBox" class="deposits-list">
        <p class="note">جاري تحميل حالة التوثيق...</p>
      </div>
    </section>

    <section class="section-box">
      <div class="section-title">
        <h2>إرسال طلب التوثيق</h2>
      </div>

      <form id="kycForm" class="deposit-form">
        <input
          type="text"
          id="kycFullName"
          class="form-input"
          placeholder="الاسم الكامل"
          required
        />

        <input
          type="text"
          id="kycCountry"
          class="form-input"
          placeholder="الدولة"
          required
        />

        <input
          type="text"
          id="kycIdNumber"
          class="form-input"
          placeholder="رقم الهوية"
          required
        />

        <label class="upload-label">
          صورة الهوية الأمامية
          <input type="file" id="frontImage" accept="image/*" required />
        </label>

        <label class="upload-label">
          صورة الهوية الخلفية
          <input type="file" id="backImage" accept="image/*" required />
        </label>

        <label class="upload-label">
          صورة سيلفي
          <input type="file" id="selfieImage" accept="image/*" required />
        </label>

        <button type="submit" class="primary-btn full-btn">إرسال الطلب</button>
      </form>

      <p id="kycMessage" class="note form-message"></p>
    </section>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span>🏠</span>
        <small>الرئيسية</small>
      </a>
      <a href="plans.html" class="nav-item">
        <span>📊</span>
        <small>الخطط</small>
      </a>
      <a href="deposit.html" class="nav-item">
        <span>📈</span>
        <small>إيداع</small>
      </a>
      <a href="withdraw.html" class="nav-item">
        <span>💼</span>
        <small>سحب</small>
      </a>
      <a href="account.html" class="nav-item active">
        <span>👤</span>
        <small>الحساب</small>
      </a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="kyc.js"></script>
</body>
</html>
